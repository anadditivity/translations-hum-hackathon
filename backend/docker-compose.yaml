services:
  db:
    image: postgres:alpine3.22
    # restart: always
    shm_size: 128mb
    ports:
      - 5432:5432
    env_file:
      - .env
    environment:
      - POSTGRES_DB=translation_db
    volumes:
      - ${PWD}/db-data/:/var/lib/postgresql/data/:z
      - ${PWD}/db/create_db.sql:/docker-entrypoint-initdb.d/init.sql:z


  backend:
    image: translation/api
    build:
      dockerfile: ./Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ${PWD}/run.sh:/app/run.sh:z
    env_file:
      - .env

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
