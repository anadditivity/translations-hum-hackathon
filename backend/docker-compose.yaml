services:
  db:
    image: postgres:alpine3.22
    # restart: always
    shm_size: 128mb
    ports:
      - 5432:5432
    env_file:
      - .env
    volumes:
        - ${PWD}/db-data/:/var/lib/postgresql/data/
        - ${PWD}/db/create_db.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: translation/api
    build:
      dockerfile: ./Dockerfile
    ports:
      - 8000:8000
