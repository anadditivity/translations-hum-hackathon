services:
  db:
    image: postgres:alpine3.22
    # restart: always
    shm_size: 128mb
    ports:
      - 5432:5432
    env_file:
      - .env
    environment:
      - POSTGRES_DB=translation_db
    volumes:
      - ${PWD}/backend/db-data/:/var/lib/postgresql/data/:z
      - ${PWD}/backend/db/create_db.sql:/docker-entrypoint-initdb.d/create_tables.sql:z
      - ${PWD}/backend/db/traditional_view.sql:/docker-entrypoint-initdb.d/create_views.sql:z

  backend:
    build:
      dockerfile: backend/Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ${PWD}/backend:/app:z
      # - ${PWD}/backend/run.sh:/app/run.sh:z
    env_file:
      - .env

  frontend:
    build:
      dockerfile: frontend/Dockerfile
    ports:
      - 5000:5000
    volumes:
      - ${PWD}/frontend:/app:z

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
